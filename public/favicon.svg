<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Fondo azul -->
  <rect width="100" height="100" fill="#0066cc" rx="8"/>
  
  <!-- ST en la parte superior -->
  <text x="50" y="45" font-family="Arial Black, Arial, sans-serif" font-size="55" font-weight="900" fill="white" text-anchor="middle" letter-spacing="-4">ST</text>
  
  <!-- Flecha muy pequeña amarilla -->
  <rect x="35" y="50" width="30" height="2" fill="#ffcc00" rx="1"/>
  <polygon points="50,55 42,52 58,52" fill="#ffcc00"/>
  
  <!-- AUT en la parte inferior -->
  <text x="50" y="90" font-family="Arial Black, Arial, sans-serif" font-size="50" font-weight="900" fill="white" text-anchor="middle" letter-spacing="-2">AUT</text>
</svg>
